<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garmin Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-form">
    <h2 style="margin-bottom: 25px;">Welkom bij Garmin</h2>
    <button class="google-btn" onclick="signInWithGoogle()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" alt="Google">
        Inloggen met Google
    </button>
</div>

<div class="dashboard-grid" id="dashboard">
    <div class="header">
        <h1>Garmin Dashboard</h1>
    </div>
    <div class="card"><canvas id="sleepChart"></canvas></div>
    <div class="card"><canvas id="hrvChart"></canvas></div>
    <div class="card"><canvas id="rhrChart"></canvas></div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
